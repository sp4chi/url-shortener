<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>URL Shortener</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>URL Shortener</h1>

        <form id="shorten-form">
            <input type="text" id="url-input" placeholder="Paste a long URL..." required>
            <button type="submit">Shorten</button>
        </form>

        <div id="result" class="hidden">
            <p>Your short link: <a id="short-link" href="#" target="_blank"></a></p>
            <button id="copy-btn">Copy</button>
        </div>

        <h2>Your Links</h2>
        <table id="links-table">
            <thead>
                <tr>
                    <th>Short Link</th>
                    <th>Original URL</th>
                    <th>Clicks</th>
                </tr>
            </thead>
            <tbody id="links-body"></tbody>
        </table>
        <h2>Click Forecast</h2>
        <div class="predict-controls">
            <select id="predict-select"></select>
            <button id="refresh-chart-btn" type="button">Refresh</button>
        </div>
        <div id="trend-badge"></div>
        <canvas id="clicksChart" height="250"></canvas>
        <p class="disclaimer">Forecast based on a simple linear trend model — treat as a rough estimate, not a
            guarantee.</p>
    </div>

    <script src="app.js"></script>
</body>

</html>
